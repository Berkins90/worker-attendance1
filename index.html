<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل حضور العمال</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px;
width:48%;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.in{
background:#2ecc71;
}

.out{
background:#e74c3c;
}
</style>
</head>

<body>

<div class="box">

<h2>تسجيل حضور العمال</h2>

  <select id="workerId">
<option>w001</option>
<option>W002</option>
<option>W003</option>
<option>W004</option>

    <select id="workerName">
<option>ايهاب نوفل</option>
<option>يزن بواطنة</option>
<option>خالد ابو العيش</option>
<option>عدنان شاقلدي</option>

<select id="site">
<option>برج عابدين</option>
<option>برج ليوان 2</option>
<option>فيلة كريم عين يبرود</option>
<option>فيلة نعيم عين يبرود</option>
<option>فيلة الجعبة المزرعة</option>
  <option>فيلة جرار سردا</option>
</select>

<div style="display:flex;justify-content:space-between;margin-top:10px">

<button class="in" onclick="sendAttendance('checkin')">
تسجيل دخول
</button>

<button class="out" onclick="sendAttendance('checkout')">
تسجيل خروج
</button>

</div>

<p id="msg"></p>

</div>

<script>

const WEBHOOK_URL="https://mbarakat1990.app.n8n.cloud/webhook-test/attendance";

function sendAttendance(action){

const workerId=document.getElementById("workerId").value;
const workerName=document.getElementById("workerName").value;
const site=document.getElementById("site").value;

document.getElementById("msg").innerText="جار الإرسال...";

fetch(WEBHOOK_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
workerId,
workerName,
site,
action,
time:new Date().toISOString()
})
})
.then(r=>r.text())
.then(()=>{
document.getElementById("msg").innerText="تم التسجيل بنجاح";
})
.catch(()=>{
document.getElementById("msg").innerText="فشل الاتصال";
});

}

</script>

</body>
</html>
